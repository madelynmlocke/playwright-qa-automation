name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test
      env:
        EMAIL_VALID: ${{ secrets.EMAIL_VALID }}
        PASSWORD_VALID: ${{ secrets.PASSWORD_VALID }}
        EMAIL_INVALID: ${{ secrets.EMAIL_INVALID }}
        PASSWORD_INVALID: ${{ secrets.PASSWORD_INVALID }}
        EMAIL_CREATE: ${{ secrets.EMAIL_CREATE }}
        PASSWORD_CREATE: ${{ secrets.PASSWORD_CREATE }}
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
